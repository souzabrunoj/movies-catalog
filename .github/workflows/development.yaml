name: Build development quality

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-check
        with:
          gradle-args: detekt

  ktlint:
    name: KtLint Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-check
        with:
          gradle-args: ktlintCheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - uses: ./.github/actions/gradle-check
        with:
          gradle-args: ":composeApp:jvmTest"
