name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Detekt
        run: ./gradlew detekt --stacktrace --no-daemon

      - name: ktlint (check)
        run: ./gradlew ktlintCheck --stacktrace --no-daemon

      - name: Unit tests (JVM / commonTest)
        run: ./gradlew :composeApp:jvmTest --stacktrace --no-daemon

      - name: Assemble debug APK
        run: ./gradlew :androidApp:assembleDebug --stacktrace --no-daemon
